- id: 01K04CCVPRA719P170YZW3D28B
  name: crypto giveaway
  notes:
    - A message (often just with images) showing faked news articles about crypto casino giveaways, early mints or similar as well as faked proof of receiving credit in a crypto wallet.
    - Variants with different stories and influencers as well as different looks for the fake casino exist.
    - New variants with `@everyone` pings and/or just the phrase `bro` exist. Image names are now somehwat random.
  images:
    - alt: picture of a screen showing a faked twitter post by alleged mr beast (youtuber) about launching their own crypto casino giving away a large amount of money to everyone registering
      path: ./images/crypto-casino-1.jpg
    - alt: picture of a screen showing "activate code" screen of a crypto casino
      path: ./images/crypto-casino-2.jpg
    - alt: screen showing the received award
      path: ./images/crypto-casino-3.jpg
    - alt: picture of a "successful withdrawal" pop-up with a phone screen showing the alleged payment in a crypto wallet
      path: ./images/crypto-casino-4.jpg
  detection:
    - type: other
      explanation: "Optical Character Recognition: `cryptocurrency casino`, `reward received`, `receive usdt`"
    - type: other
      explanation: Consider using perceptual hashing approaches. The images are not identical but very similar.
